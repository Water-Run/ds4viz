[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "ds4viz"
version = "1.0.0"
description = "ds4viz的Python支持: 可扩展的数据结构可视化教学平台 Python 库"
readme = "README.md"
license = {text = "MIT"}
authors = [
    {name = "WaterRun", email = "linzhuangrun49@gmail.com"}
]
maintainers = [
    {name = "WaterRun", email = "linzhuangrun49@gmail.com"}
]
keywords = [
    "data-structure",
    "visualization",
    "algorithm",
    "education",
    "teaching",
    "toml",
    "trace"
]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Intended Audience :: Education",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Education",
    "Topic :: Scientific/Engineering :: Visualization",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Typing :: Typed"
]
requires-python = ">=3.12"
dependencies = []

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "pytest-cov>=4.1.0",
    "mypy>=1.8.0",
    "ruff>=0.1.0"
]

[project.urls]
Homepage = "https://github.com/Water-Run/ds4viz"
Documentation = "https://github.com/Water-Run/ds4viz#readme"
Repository = "https://github.com/Water-Run/ds4viz.git"
Issues = "https://github.com/Water-Run/ds4viz/issues"
Changelog = "https://github.com/Water-Run/ds4viz/releases"

[tool.hatch.build.targets.sdist]
include = [
    "/ds4viz"
]

[tool.hatch.build.targets.wheel]
packages = ["ds4viz"]

[tool.pytest.ini_options]
testpaths = ["test"]
python_files = ["*_test.py", "test_*.py"]
python_functions = ["test_*"]
python_classes = ["Test*"]
addopts = "-v --tb=short"

[tool.mypy]
python_version = "3.12"
strict = true
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
check_untyped_defs = true
disallow_untyped_decorators = true
no_implicit_optional = true
warn_redundant_casts = true
warn_unused_ignores = true
warn_no_return = true
warn_unreachable = true
show_error_codes = true
show_column_numbers = true

[tool.ruff]
target-version = "py312"
line-length = 120

[tool.ruff.lint]
select = [
    "E",      # pycodestyle errors
    "W",      # pycodestyle warnings
    "F",      # pyflakes
    "I",      # isort
    "B",      # flake8-bugbear
    "C4",     # flake8-comprehensions
    "UP",     # pyupgrade
    "ARG",    # flake8-unused-arguments
    "SIM",    # flake8-simplify
    "TCH",    # flake8-type-checking
    "PTH",    # flake8-use-pathlib
    "RUF"     # ruff-specific rules
]
ignore = [
    "E501",   # line too long (handled by formatter)
    "B008",   # do not perform function calls in argument defaults
    "B905",   # zip without strict
    "SIM108"  # use ternary operator instead of if-else
]

[tool.ruff.lint.isort]
known-first-party = ["ds4viz"]

[tool.ruff.lint.per-file-ignores]
"test/*" = ["ARG001", "ARG002"]

[tool.coverage.run]
source = ["ds4viz"]
branch = true

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "raise NotImplementedError",
    "if TYPE_CHECKING:",
    "if __name__ == .__main__.:",
    "\\.\\.\\."
]