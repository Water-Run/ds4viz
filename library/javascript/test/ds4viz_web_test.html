<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ds4viz.js 测试套件</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
            background: #fafafa;
            min-height: 100vh;
            color: #404040;
            font-size: 14px;
            line-height: 1.6;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 48px 48px 32px;
        }

        @media (max-width: 1024px) {
            .container {
                padding: 32px;
            }
        }

        @media (max-width: 640px) {
            .container {
                padding: 20px;
            }
        }

        header {
            margin-bottom: 32px;
        }

        h1 {
            font-size: 32px;
            font-weight: 600;
            color: #0f0f0f;
            letter-spacing: -0.02em;
            margin-bottom: 6px;
        }

        .subtitle {
            color: #737373;
            font-size: 14px;
        }

        .controls {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
        }

        button {
            height: 38px;
            padding: 0 18px;
            font-size: 14px;
            font-weight: 500;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.15s ease;
            font-family: inherit;
        }

        #runBtn {
            background: #0f0f0f;
            color: #ffffff;
            border: none;
        }

        #runBtn:hover {
            background: #262626;
        }

        #runBtn:disabled {
            background: #a3a3a3;
            cursor: not-allowed;
        }

        #clearBtn {
            background: #ffffff;
            color: #404040;
            border: 1px solid #e5e5e5;
        }

        #clearBtn:hover {
            background: #f5f5f5;
            border-color: #d4d4d4;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 24px;
        }

        @media (max-width: 640px) {
            .stats {
                grid-template-columns: 1fr;
            }
        }

        .stat-card {
            background: #ffffff;
            padding: 24px;
            border-radius: 12px;
            border: 1px solid #e5e5e5;
        }

        .stat-value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 32px;
            font-weight: 600;
            margin-bottom: 4px;
            color: #0f0f0f;
        }

        .stat-label {
            color: #737373;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .stat-card.total .stat-value {
            color: #0f0f0f;
        }

        .stat-card.passed .stat-value {
            color: #22c55e;
        }

        .stat-card.failed .stat-value {
            color: #ef4444;
        }

        .stat-card.time .stat-value {
            color: #f59e0b;
        }

        .progress-container {
            background: #e5e5e5;
            border-radius: 6px;
            height: 6px;
            overflow: hidden;
            margin-bottom: 24px;
        }

        .progress-bar {
            height: 100%;
            background: #22c55e;
            width: 0%;
            transition: width 0.3s ease;
            border-radius: 6px;
        }

        .progress-bar.has-failures {
            background: linear-gradient(90deg, #22c55e var(--pass-percent), #ef4444 var(--pass-percent));
        }

        .output-container {
            background: #ffffff;
            border-radius: 12px;
            border: 1px solid #e5e5e5;
            overflow: hidden;
        }

        .output-header {
            background: #f5f5f5;
            padding: 16px 24px;
            border-bottom: 1px solid #e5e5e5;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .output-title {
            font-weight: 500;
            color: #0f0f0f;
            font-size: 13px;
        }

        .output-hint {
            color: #a3a3a3;
            font-size: 12px;
        }

        #output {
            padding: 24px;
            max-height: 600px;
            overflow-y: auto;
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            line-height: 1.7;
        }

        .test-suite {
            margin-bottom: 24px;
        }

        .test-suite:last-child {
            margin-bottom: 0;
        }

        .suite-header {
            color: #0f0f0f;
            font-weight: 600;
            font-size: 13px;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid #e5e5e5;
            font-family: 'Inter', sans-serif;
        }

        .test-case {
            padding: 6px 0;
            padding-left: 16px;
            display: flex;
            align-items: flex-start;
            gap: 10px;
        }

        .test-case.pass .status {
            color: #22c55e;
        }

        .test-case.fail .status {
            color: #ef4444;
        }

        .status {
            font-weight: 500;
            min-width: 16px;
        }

        .test-name {
            color: #404040;
        }

        .test-case.fail .test-name {
            color: #ef4444;
        }

        .error-details {
            margin-top: 6px;
            margin-left: 26px;
            padding: 12px 16px;
            background: #fef2f2;
            border-radius: 6px;
            border-left: 3px solid #ef4444;
            color: #b91c1c;
            font-size: 12px;
            white-space: pre-wrap;
            word-break: break-all;
        }

        .summary {
            margin-top: 24px;
            padding: 20px 24px;
            background: #f5f5f5;
            border-radius: 8px;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            font-size: 14px;
            color: #404040;
        }

        .summary.all-passed {
            background: #f0fdf4;
            color: #166534;
        }

        .summary.has-failures {
            background: #fef2f2;
            color: #b91c1c;
        }

        .loading {
            display: none;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 48px;
            color: #737373;
            font-family: 'Inter', sans-serif;
        }

        .loading.active {
            display: flex;
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid #e5e5e5;
            border-top-color: #0f0f0f;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .hidden {
            display: none !important;
        }

        footer {
            margin-top: 32px;
            padding-top: 24px;
            border-top: 1px solid #e5e5e5;
            color: #a3a3a3;
            font-size: 13px;
        }

        footer a {
            color: #737373;
            text-decoration: none;
        }

        footer a:hover {
            color: #0f0f0f;
        }

        @media print {

            .stat-card,
            .output-container {
                box-shadow: none;
                border: 1px solid #d4d4d4;
            }

            .controls {
                display: none;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <h1>ds4viz.js 测试套件</h1>
            <p class="subtitle">数据结构可视化追踪库 - JavaScript 版本</p>
        </header>

        <div class="controls">
            <button id="runBtn" onclick="runTests()">运行测试</button>
            <button id="clearBtn" onclick="clearOutput()">清空输出</button>
        </div>

        <div class="stats">
            <div class="stat-card total">
                <div class="stat-value" id="totalCount">0</div>
                <div class="stat-label">总测试数</div>
            </div>
            <div class="stat-card passed">
                <div class="stat-value" id="passedCount">0</div>
                <div class="stat-label">通过</div>
            </div>
            <div class="stat-card failed">
                <div class="stat-value" id="failedCount">0</div>
                <div class="stat-label">失败</div>
            </div>
            <div class="stat-card time">
                <div class="stat-value" id="timeElapsed">0</div>
                <div class="stat-label">耗时 (ms)</div>
            </div>
        </div>

        <div class="progress-container">
            <div class="progress-bar" id="progressBar"></div>
        </div>

        <div class="output-container">
            <div class="output-header">
                <span class="output-title">测试输出</span>
                <span class="output-hint">打开控制台 (F12) 查看详细日志</span>
            </div>
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <span>正在运行测试...</span>
            </div>
            <div id="output"></div>
        </div>

        <footer>
            <p>ds4viz v0.1.0 · 作者: <a href="mailto:linzhuangrun49@gmail.com">WaterRun</a></p>
        </footer>
    </div>

    <script src="../ds4viz.js"></script>

    <script>
        'use strict';

        // ============================================================================
        // 简易测试框架
        // ============================================================================

        class TestRunner {
            constructor() {
                this.suites = [];
                this.currentSuite = null;
                this.results = {
                    total: 0,
                    passed: 0,
                    failed: 0,
                    errors: []
                };
            }

            describe(name, fn) {
                this.currentSuite = { name, tests: [] };
                fn();
                this.suites.push(this.currentSuite);
                this.currentSuite = null;
            }

            it(name, fn) {
                if (this.currentSuite) {
                    this.currentSuite.tests.push({ name, fn });
                }
            }

            async run() {
                const startTime = performance.now();
                this.results = { total: 0, passed: 0, failed: 0, errors: [] };

                for (const suite of this.suites) {
                    console.group(`%c${suite.name}`, 'color: #0f0f0f; font-weight: bold;');

                    for (const test of suite.tests) {
                        this.results.total++;
                        try {
                            ds4viz.config({});

                            const result = test.fn();
                            if (result instanceof Promise) {
                                await result;
                            }
                            this.results.passed++;
                            console.log(`  %c✓%c ${test.name}`, 'color: #22c55e;', 'color: inherit;');
                        } catch (error) {
                            this.results.failed++;
                            this.results.errors.push({
                                suite: suite.name,
                                test: test.name,
                                error: error.message || String(error),
                                stack: error.stack
                            });
                            console.log(`  %c✗%c ${test.name}`, 'color: #ef4444;', 'color: #ef4444;');
                            console.error(`    Error: ${error.message}`);
                        }
                    }

                    console.groupEnd();
                }

                const endTime = performance.now();
                return {
                    ...this.results,
                    time: Math.round(endTime - startTime)
                };
            }
        }

        function expect(actual) {
            return {
                toBe(expected) {
                    if (actual !== expected) {
                        throw new Error(`Expected ${JSON.stringify(expected)}, but got ${JSON.stringify(actual)}`);
                    }
                },
                toEqual(expected) {
                    if (JSON.stringify(actual) !== JSON.stringify(expected)) {
                        throw new Error(`Expected ${JSON.stringify(expected)}, but got ${JSON.stringify(actual)}`);
                    }
                },
                toBeTruthy() {
                    if (!actual) {
                        throw new Error(`Expected truthy value, but got ${JSON.stringify(actual)}`);
                    }
                },
                toBeFalsy() {
                    if (actual) {
                        throw new Error(`Expected falsy value, but got ${JSON.stringify(actual)}`);
                    }
                },
                toBeGreaterThan(expected) {
                    if (!(actual > expected)) {
                        throw new Error(`Expected ${actual} to be greater than ${expected}`);
                    }
                },
                toBeGreaterThanOrEqual(expected) {
                    if (!(actual >= expected)) {
                        throw new Error(`Expected ${actual} to be greater than or equal to ${expected}`);
                    }
                },
                toBeLessThan(expected) {
                    if (!(actual < expected)) {
                        throw new Error(`Expected ${actual} to be less than ${expected}`);
                    }
                },
                toBeLessThanOrEqual(expected) {
                    if (!(actual <= expected)) {
                        throw new Error(`Expected ${actual} to be less than or equal to ${expected}`);
                    }
                },
                toContain(expected) {
                    if (typeof actual === 'string') {
                        if (!actual.includes(expected)) {
                            throw new Error(`Expected string to contain "${expected}"`);
                        }
                    } else if (Array.isArray(actual)) {
                        if (!actual.includes(expected)) {
                            throw new Error(`Expected array to contain ${JSON.stringify(expected)}`);
                        }
                    } else {
                        throw new Error('toContain only works with strings and arrays');
                    }
                },
                not: {
                    toBe(expected) {
                        if (actual === expected) {
                            throw new Error(`Expected ${JSON.stringify(actual)} not to be ${JSON.stringify(expected)}`);
                        }
                    },
                    toContain(expected) {
                        if (typeof actual === 'string' && actual.includes(expected)) {
                            throw new Error(`Expected string not to contain "${expected}"`);
                        }
                    }
                },
                toThrow(ErrorClass) {
                    if (typeof actual !== 'function') {
                        throw new Error('toThrow expects a function');
                    }
                    let threw = false;
                    let thrownError = null;
                    try {
                        actual();
                    } catch (e) {
                        threw = true;
                        thrownError = e;
                    }
                    if (!threw) {
                        throw new Error('Expected function to throw an error');
                    }
                    if (ErrorClass && !(thrownError instanceof ErrorClass)) {
                        throw new Error(`Expected error to be instance of ${ErrorClass.name}`);
                    }
                },
                toBeInstanceOf(expected) {
                    if (!(actual instanceof expected)) {
                        throw new Error(`Expected value to be instance of ${expected.name}`);
                    }
                },
                toBeDefined() {
                    if (actual === undefined) {
                        throw new Error('Expected value to be defined');
                    }
                },
                toBeUndefined() {
                    if (actual !== undefined) {
                        throw new Error(`Expected undefined, but got ${JSON.stringify(actual)}`);
                    }
                },
                toMatch(pattern) {
                    if (!pattern.test(actual)) {
                        throw new Error(`Expected "${actual}" to match ${pattern}`);
                    }
                },
                toHaveLength(expected) {
                    if (actual.length !== expected) {
                        throw new Error(`Expected length ${expected}, but got ${actual.length}`);
                    }
                }
            };
        }

        // ============================================================================
        // 测试用例定义
        // ============================================================================

        const runner = new TestRunner();

        // ----------------------------------------------------------------------------
        // 环境检测测试
        // ----------------------------------------------------------------------------

        runner.describe('环境检测', () => {
            runner.it('isBrowserEnvironment 应返回 true', () => {
                expect(ds4viz.isBrowserEnvironment()).toBe(true);
            });

            runner.it('isNodeEnvironment 应返回 false', () => {
                expect(ds4viz.isNodeEnvironment()).toBe(false);
            });
        });

        // ----------------------------------------------------------------------------
        // 错误类型测试
        // ----------------------------------------------------------------------------

        runner.describe('错误类型', () => {
            runner.it('ErrorType 枚举应包含所有类型', () => {
                expect(ds4viz.ErrorType.Runtime).toBe('runtime');
                expect(ds4viz.ErrorType.Timeout).toBe('timeout');
                expect(ds4viz.ErrorType.Validation).toBe('validation');
                expect(ds4viz.ErrorType.Sandbox).toBe('sandbox');
                expect(ds4viz.ErrorType.Unknown).toBe('unknown');
            });

            runner.it('DS4VizError 应正确设置属性', () => {
                const error = new ds4viz.DS4VizError('test message', ds4viz.ErrorType.Runtime, 10);
                expect(error.message).toBe('test message');
                expect(error.errorType).toBe('runtime');
                expect(error.line).toBe(10);
                expect(error.name).toBe('DS4VizError');
            });

            runner.it('DS4VizError 应使用默认值', () => {
                const error = new ds4viz.DS4VizError('test');
                expect(error.errorType).toBe('runtime');
                expect(error.line).toBeUndefined();
            });

            runner.it('StructureError 应继承 DS4VizError', () => {
                const error = new ds4viz.StructureError('structure error', 15);
                expect(error).toBeInstanceOf(ds4viz.DS4VizError);
                expect(error).toBeInstanceOf(Error);
                expect(error.name).toBe('StructureError');
                expect(error.errorType).toBe('runtime');
            });

            runner.it('ValidationError 应继承 DS4VizError', () => {
                const error = new ds4viz.ValidationError('validation error', 20);
                expect(error).toBeInstanceOf(ds4viz.DS4VizError);
                expect(error.name).toBe('ValidationError');
                expect(error.errorType).toBe('validation');
            });
        });

        // ----------------------------------------------------------------------------
        // 全局配置测试
        // ----------------------------------------------------------------------------

        runner.describe('全局配置', () => {
            runner.it('config 应设置所有配置项', () => {
                ds4viz.config({
                    outputPath: '/custom/path.toml',
                    title: 'Test Title',
                    author: 'Test Author',
                    comment: 'Test Comment'
                });
                const cfg = ds4viz.getConfig();
                expect(cfg.outputPath).toBe('/custom/path.toml');
                expect(cfg.title).toBe('Test Title');
                expect(cfg.author).toBe('Test Author');
                expect(cfg.comment).toBe('Test Comment');
            });

            runner.it('config 应使用默认值', () => {
                ds4viz.config({});
                const cfg = ds4viz.getConfig();
                expect(cfg.outputPath).toBe('trace.toml');
                expect(cfg.title).toBe('');
                expect(cfg.author).toBe('');
                expect(cfg.comment).toBe('');
            });

            runner.it('config 应支持部分配置', () => {
                ds4viz.config({ title: 'Only Title' });
                const cfg = ds4viz.getConfig();
                expect(cfg.title).toBe('Only Title');
                expect(cfg.author).toBe('');
            });
        });

        // ----------------------------------------------------------------------------
        // Trace 创建函数测试
        // ----------------------------------------------------------------------------

        runner.describe('Trace 创建函数', () => {
            runner.it('createMeta 应创建正确的 Meta 对象', () => {
                const meta = ds4viz.createMeta('2025-01-01T00:00:00Z', 'ES2022');
                expect(meta.createdAt).toBe('2025-01-01T00:00:00Z');
                expect(meta.lang).toBe('javascript');
                expect(meta.langVersion).toBe('ES2022');
            });

            runner.it('createPackage 应创建默认的 Package 对象', () => {
                const pkg = ds4viz.createPackage();
                expect(pkg.name).toBe('ds4viz');
                expect(pkg.lang).toBe('javascript');
                expect(pkg.version).toBe('0.1.0');
            });

            runner.it('createRemarks 应创建 Remarks 对象', () => {
                const remarks = ds4viz.createRemarks('Title', 'Author', 'Comment');
                expect(remarks.title).toBe('Title');
                expect(remarks.author).toBe('Author');
                expect(remarks.comment).toBe('Comment');
            });

            runner.it('isRemarksEmpty 应正确判断空备注', () => {
                expect(ds4viz.isRemarksEmpty({ title: '', author: '', comment: '' })).toBe(true);
                expect(ds4viz.isRemarksEmpty({ title: 'T', author: '', comment: '' })).toBe(false);
                expect(ds4viz.isRemarksEmpty({ title: '', author: 'A', comment: '' })).toBe(false);
                expect(ds4viz.isRemarksEmpty({ title: '', author: '', comment: 'C' })).toBe(false);
            });

            runner.it('createTraceObject 应创建正确的对象', () => {
                const obj = ds4viz.createTraceObject('stack', 'my_stack');
                expect(obj.kind).toBe('stack');
                expect(obj.label).toBe('my_stack');
            });

            runner.it('createState 应创建正确的状态', () => {
                const state = ds4viz.createState(5, { items: [1, 2, 3] });
                expect(state.id).toBe(5);
                expect(state.data.items).toEqual([1, 2, 3]);
            });

            runner.it('createStep 应创建完整的步骤', () => {
                const step = ds4viz.createStep(0, 'push', 0, 1, { value: 42 }, { line: 10 }, 42, 'note');
                expect(step.id).toBe(0);
                expect(step.op).toBe('push');
                expect(step.before).toBe(0);
                expect(step.after).toBe(1);
                expect(step.args.value).toBe(42);
                expect(step.code.line).toBe(10);
                expect(step.ret).toBe(42);
                expect(step.note).toBe('note');
            });

            runner.it('createStep 应处理可选字段', () => {
                const step = ds4viz.createStep(0, 'push', 0, undefined, {});
                expect(step.after).toBeUndefined();
                expect(step.code).toBeUndefined();
                expect(step.ret).toBeUndefined();
                expect(step.note).toBeUndefined();
            });

            runner.it('createResult 应创建正确的结果', () => {
                const result1 = ds4viz.createResult(5);
                expect(result1.finalState).toBe(5);
                expect(result1.commit).toBeUndefined();

                const result2 = ds4viz.createResult(5, { op: 'commit', line: 20 });
                expect(result2.commit.op).toBe('commit');
                expect(result2.commit.line).toBe(20);
            });

            runner.it('createTraceError 应创建错误对象', () => {
                const error = ds4viz.createTraceError('runtime', 'Error message', 10, 2, 1);
                expect(error.type).toBe('runtime');
                expect(error.message).toBe('Error message');
                expect(error.line).toBe(10);
                expect(error.step).toBe(2);
                expect(error.lastState).toBe(1);
            });

            runner.it('createTrace 应创建完整的 Trace', () => {
                const meta = ds4viz.createMeta('2025-01-01T00:00:00Z', 'ES2022');
                const pkg = ds4viz.createPackage();
                const remarks = ds4viz.createRemarks('', '', '');
                const obj = ds4viz.createTraceObject('stack', 'test');
                const states = [ds4viz.createState(0, { items: [] })];
                const steps = [];
                const result = ds4viz.createResult(0);

                const trace = ds4viz.createTrace(meta, pkg, remarks, obj, states, steps, result);
                expect(trace.meta).toBe(meta);
                expect(trace.package).toBe(pkg);
                expect(trace.object).toBe(obj);
                expect(trace.result).toBe(result);
                expect(trace.error).toBeUndefined();
            });
        });

        // ----------------------------------------------------------------------------
        // TomlWriter 测试
        // ----------------------------------------------------------------------------

        runner.describe('TomlWriter', () => {
            runner.it('应正确序列化基本 Trace', () => {
                const meta = ds4viz.createMeta('2025-01-01T00:00:00Z', 'ES2022');
                const pkg = ds4viz.createPackage();
                const remarks = ds4viz.createRemarks('', '', '');
                const obj = ds4viz.createTraceObject('stack', 'test');
                const states = [ds4viz.createState(0, { items: [], top: -1 })];
                const result = ds4viz.createResult(0);
                const trace = ds4viz.createTrace(meta, pkg, remarks, obj, states, [], result);

                const writer = new ds4viz.TomlWriter(trace);
                const content = writer.serialize();

                expect(content).toContain('[meta]');
                expect(content).toContain('created_at = "2025-01-01T00:00:00Z"');
                expect(content).toContain('lang = "javascript"');
                expect(content).toContain('[package]');
                expect(content).toContain('name = "ds4viz"');
                expect(content).toContain('[object]');
                expect(content).toContain('kind = "stack"');
            });

            runner.it('应正确序列化备注', () => {
                const meta = ds4viz.createMeta('2025-01-01T00:00:00Z', 'ES2022');
                const pkg = ds4viz.createPackage();

                await ds4viz.withContext(s, async (stack) => {
                    stack.push(1);
                    await new Promise((resolve) => setTimeout(resolve, 10));
                    stack.push(2);
                });

                const content = s.getTomlString();
                expect(content).toContain('[result]');
            });

            runner.it('应捕获并记录错误', async () => {
                const s = new ds4viz.Stack();
                let threw = false;
                try {
                    await ds4viz.withContext(s, (stack) => {
                        stack.pop();
                    });
                } catch (e) {
                    threw = true;
                }

                expect(threw).toBe(true);
                const content = s.getTomlString();
                expect(content).toContain('[error]');
                expect(content).toContain('Cannot pop from empty stack');
            });

            runner.it('应重新抛出错误', async () => {
                const s = new ds4viz.Stack();
                let threw = false;
                let errorMessage = '';
                try {
                    await ds4viz.withContext(s, () => {
                        throw new Error('Custom error');
                    });
                } catch (e) {
                    threw = true;
                    errorMessage = e.message;
                }

                expect(errorMessage).toBe('Custom error');

        // ----------------------------------------------------------------------------
        // 复杂操作序列测试
        // ----------------------------------------------------------------------------

        runner.describe('复杂操作序列', () => {
            runner.it('栈 push-pop 序列', () => {
                const s = new ds4viz.Stack();
                s.enter();

                for (let i = 0; i < 10; i++) {
                    s.push(i);
                }
                for (let i = 0; i < 5; i++) {
                    s.pop();
                }

                s.dispose();

                const content = s.getTomlString();
                const pushCount = (content.match(/op = "push"/g) || []).length;
                const popCount = (content.match(/op = "pop"/g) || []).length;
                expect(pushCount).toBe(10);
                expect(popCount).toBe(5);
            });

            runner.it('队列 enqueue-dequeue 序列', () => {
                const q = new ds4viz.Queue();
                q.enter();

                for (let i = 0; i < 5; i++) {
                    q.enqueue(i);
                }
                for (let i = 0; i < 3; i++) {
                    q.dequeue();
                }
                for (let i = 5; i < 8; i++) {
                    q.enqueue(i);
                }

                q.dispose();

                const content = q.getTomlString();
                const enqueueCount = (content.match(/op = "enqueue"/g) || []).length;
                const dequeueCount = (content.match(/op = "dequeue"/g) || []).length;
                expect(enqueueCount).toBe(8);
                expect(dequeueCount).toBe(3);
            });

            runner.it('链表复杂操作', () => {
                const list = new ds4viz.SingleLinkedList();
                list.enter();

                const id1 = list.insertHead(1);
                const id2 = list.insertTail(3);
                list.insertAfter(id1, 2);
                list.delete(id2);
                list.reverse();

                list.dispose();

                const content = list.getTomlString();
                expect(content).toContain('op = "insert_head"');
                expect(content).toContain('op = "insert_tail"');
                expect(content).toContain('op = "insert_after"');
                expect(content).toContain('op = "delete"');
                expect(content).toContain('op = "reverse"');
            });

            runner.it('BST 复杂操作', () => {
                const bst = new ds4viz.BinarySearchTree();
                bst.enter();

                bst.insert(50);
                bst.insert(30);
                bst.insert(70);
                bst.insert(20);
                bst.insert(40);
                bst.insert(60);
                bst.insert(80);
                bst.delete(30);
                bst.delete(70);

                bst.dispose();

                const content = bst.getTomlString();
                const insertCount = (content.match(/op = "insert"/g) || []).length;
                const deleteCount = (content.match(/op = "delete"/g) || []).length;
                expect(insertCount).toBe(7);
                expect(deleteCount).toBe(2);
            });

            runner.it('堆复杂操作', () => {
                const h = new ds4viz.Heap({ heapType: 'min' });
                h.enter();

                const values = [3, 1, 4, 1, 5, 9, 2, 6, 5, 3, 5];
                for (const v of values) {
                    h.insert(v);
                }
                for (let i = 0; i < 5; i++) {
                    h.extract();
                }

                h.dispose();

                const content = h.getTomlString();
                const insertCount = (content.match(/op = "insert"/g) || []).length;
                const extractCount = (content.match(/op = "extract"/g) || []).length;
                expect(insertCount).toBe(11);
                expect(extractCount).toBe(5);
            });

            runner.it('图复杂操作', () => {
                const g = new ds4viz.GraphWeighted({ directed: true });
                g.enter();

                g.addNode(0, 'A');
                g.addNode(1, 'B');
                g.addNode(2, 'C');
                g.addNode(3, 'D');
                g.addEdge(0, 1, 10);
                g.addEdge(0, 2, 5);
                g.addEdge(1, 2, 2);
                g.addEdge(1, 3, 1);
                g.addEdge(2, 3, 9);
                g.updateWeight(0, 1, 8);
                g.removeEdge(1, 2);
                g.removeNode(3);

                g.dispose();

                const content = g.getTomlString();
                expect(content).toContain('op = "add_node"');
                expect(content).toContain('op = "add_edge"');
                expect(content).toContain('op = "update_weight"');
                expect(content).toContain('op = "remove_edge"');
                expect(content).toContain('op = "remove_node"');
            });
        });

            runner.it('图的孤立节点', () => {

            runner.it('完全图', () => {

                g.addNode(1, 'B');
                g.addNode(2, 'C');
                g.addNode(3, 'D');
                g.addEdge(0, 1);
                g.addEdge(0, 2);
                g.addEdge(0, 3);

                g.addEdge(1, 3);

        // ============================================================================
        // 运行测试
        // ============================================================================

        async function runTests() {
            const runBtn = document.getElementById('runBtn');
            const output = document.getElementById('output');
            const loading = document.getElementById('loading');
            const progressBar = document.getElementById('progressBar');

            runBtn.disabled = true;
            output.innerHTML = '';
            loading.classList.add('active');
            progressBar.style.width = '0%';

            console.clear();
            console.log('%cds4viz.js 测试套件', 'font-size: 16px; font-weight: bold; color: #0f0f0f;');
            console.log('────────────────────────────────────────');

            try {
                const results = await runner.run();

                document.getElementById('totalCount').textContent = results.total;
                document.getElementById('passedCount').textContent = results.passed;
                document.getElementById('failedCount').textContent = results.failed;
                document.getElementById('timeElapsed').textContent = results.time;

                const passPercent = (results.passed / results.total) * 100;
                progressBar.style.width = '100%';
                if (results.failed > 0) {
                    progressBar.classList.add('has-failures');
                    progressBar.style.setProperty('--pass-percent', passPercent + '%');
                } else {
                    progressBar.classList.remove('has-failures');
                }

                let html = '';
                for (const suite of runner.suites) {
                    html += `<div class="test-suite">`;
                    html += `<div class="suite-header">${escapeHtml(suite.name)}</div>`;

                    for (const test of suite.tests) {
                        const error = results.errors.find(e => e.suite === suite.name && e.test === test.name);
                        const passed = !error;

                        html += `<div class="test-case ${passed ? 'pass' : 'fail'}">`;
                        html += `<span class="status">${passed ? '✓' : '✗'}</span>`;
                        html += `<span class="test-name">${escapeHtml(test.name)}</span>`;
                        html += `</div>`;

                        if (error) {
                            html += `<div class="error-details">${escapeHtml(error.error)}</div>`;
                        }
                    }

                    html += `</div>`;
                }

                const summaryClass = results.failed === 0 ? 'all-passed' : 'has-failures';
                const summaryText = results.failed === 0
                    ? `所有 ${results.total} 个测试通过`
                    : `${results.passed}/${results.total} 个测试通过，${results.failed} 个失败`;

                html += `<div class="summary ${summaryClass}">${summaryText}</div>`;

                output.innerHTML = html;

                console.log('────────────────────────────────────────');
                if (results.failed === 0) {
                    console.log(`%c✓ 所有 ${results.total} 个测试通过`, 'color: #22c55e; font-weight: bold;');
                } else {
                    console.log(`%c✗ ${results.failed} 个测试失败`, 'color: #ef4444; font-weight: bold;');
                }
                console.log(`耗时: ${results.time}ms`);

            } catch (error) {
                output.innerHTML = `<div class="error-details">${escapeHtml(error.message)}</div>`;
                console.error('测试运行失败:', error);
            } finally {
                loading.classList.remove('active');
                runBtn.disabled = false;
            }
        }

        function clearOutput() {
            document.getElementById('output').innerHTML = '';
            document.getElementById('totalCount').textContent = '0';
            document.getElementById('passedCount').textContent = '0';
            document.getElementById('failedCount').textContent = '0';
            document.getElementById('timeElapsed').textContent = '0';
            document.getElementById('progressBar').style.width = '0%';
            document.getElementById('progressBar').classList.remove('has-failures');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
