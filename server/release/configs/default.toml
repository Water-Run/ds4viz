# ds4viz 服务器默认配置
# 作者: WaterRun
# 日期: 2026-01-16

[server]
# 服务器监听地址
host = "127.0.0.1"
# 服务器监听端口
port = 8080

[database]
# PostgreSQL 连接字符串
url = "postgres://ds4viz:ds4viz@127.0.0.1/ds4viz"
# 连接池最大连接数
max_connections = 10

[jwt]
# JWT 签名密钥（生产环境请使用强随机密钥）
secret = "your-secret-key-here-please-change-in-production"
# Access Token 有效期（秒），默认 1 小时
access_token_ttl_secs = 3600
# Refresh Token 有效期（秒），默认 7 天
refresh_token_ttl_secs = 604800

[quota]
# 配额刷新周期（分钟），默认 60 分钟
period_minutes = 60
# Standard 用户每周期可用 CPU 时间（毫秒），默认 10 秒
standard_cpu_time_ms = 10000
# Standard 用户单次提交代码最大字节数，默认 16KB
standard_max_code_bytes = 16384

[execution]
# 默认执行超时时间（毫秒），默认 30 秒
default_timeout_ms = 30000
# 临时文件目录
temp_dir = "/tmp/ds4viz"

[rate_limit]
# 认证接口每分钟请求限制
# 注：限流中间件将在后续迭代中实现
auth_per_minute = 5
# Standard 用户执行接口每分钟请求限制
execution_standard_per_minute = 10
# Enhanced 用户执行接口每分钟请求限制
execution_enhanced_per_minute = 60
# 通用接口每分钟请求限制
general_per_minute = 100
